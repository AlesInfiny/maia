---
# cspell:ignore mikepenz dorny
name: Dressca CMSに対するプルリクエスト時の単体テスト実行

on:
  pull_request:
    branches: [main]
    paths:
      - 'samples/dressca-cms/**'
      - '.github/workflows/samples-dressca-cms-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: ブランチのチェックアウト
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: JDK21のセットアップ
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: 'adopt'
          java-version: '21'
          cache: 'gradle'

      - name: Use Node.js LTS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: lts/*
          # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
          cache: npm
          cache-dependency-path: samples/dressca-cms/web/src/main/resources/static/bootstrap/package-lock.json

      - name: gradlewに実行権限付与
        run: chmod +x samples/dressca-cms/gradlew

      - name: ロケールを日本語に設定
        run: |
          sudo apt-get update
          sudo apt-get install -y language-pack-ja
          sudo update-locale LANG=ja_JP.UTF-8

      - name: Sass ビルド用 npm パッケージのインストール
        run: npm ci --ignore-scripts
        working-directory: ./samples/dressca-cms/web/src/main/resources/static/bootstrap

      - id: run-build-sass
        name: Sass ビルドの実行
        run: npm run build-sass > sass-build-result.txt 2>&1
        shell: bash
        working-directory: ./samples/dressca-cms/web/src/main/resources/static/bootstrap
        continue-on-error: true

      - name: Sass ビルド結果の表示
        shell: bash
        working-directory: ./samples/dressca-cms/web/src/main/resources/static/bootstrap
        if: ${{ success() || (failure() && steps.run-build-sass.outcome == 'failure') }}
        run: |
          echo '# Sass Build Result :art:' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat sass-build-result.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Sass ビルド成功
        if: ${{ steps.run-build-sass.outcome == 'success' }}
        run: |
          echo '## Sass Build Result :memo:' >> $GITHUB_STEP_SUMMARY
          echo ':heavy_check_mark: Sass ビルドに成功しました。' >> $GITHUB_STEP_SUMMARY

      - name: Sass ビルド失敗
        if: ${{ steps.run-build-sass.outcome == 'failure' }}
        run: |
          echo '## Sass Build Result :memo:' >> $GITHUB_STEP_SUMMARY
          echo ':x: Sass ビルドに失敗しました。' >> $GITHUB_STEP_SUMMARY

      - name: Sass ビルド失敗時にジョブを失敗させる
        if: ${{ steps.run-build-sass.outcome == 'failure' }}
        run: exit 1

      - id: run-build-and-tests
        name: ビルド（コンパイル, 静的テスト, JUnit）実行
        run: ./gradlew build > build-result.txt
        working-directory: ./samples/dressca-cms
        continue-on-error: true
        env:
          LANG: ja_JP.UTF-8
          LC_ALL: ja_JP.UTF-8

      - name: ビルド（コンパイル, 静的テスト, JUnit）結果の表示
        shell: bash
        working-directory: ./samples/dressca-cms
        if: ${{ success() || (failure() && steps.run-build-and-tests.outcome == 'failure') }}
        run: |
          echo '# Build Result :gear:' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build-result.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: ビルド（コンパイル, 静的テスト, JUnit）成功
        if: ${{ steps.run-build-and-tests.outcome == 'success' }}
        run: |
          echo '## Test Result :memo:' >> $GITHUB_STEP_SUMMARY
          echo ':heavy_check_mark: ビルドとテストに成功しました。' >> $GITHUB_STEP_SUMMARY

      - name: ビルド（コンパイル, 静的テスト, JUnit）失敗
        if: ${{ steps.run-build-and-tests.outcome == 'failure' }}
        run: |
          echo '## Test Result :memo:' >> $GITHUB_STEP_SUMMARY
          echo ':x: ビルドまたはテストに失敗しました。' >> $GITHUB_STEP_SUMMARY

      - name: JUnitレポート
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3  # v5.6.2
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
