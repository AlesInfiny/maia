name: "PRのブランチ組み合わせを検証"
description: "許可された head/base 組み合わせのみ許可します。"

runs:
  using: "composite"
  steps:
    - name: 許可された組み合わせかを判定
      shell: bash
      run: |
        # pull_request 以外では何もしない
        if [[ "${{ github.event_name }}" != "pull_request" ]]; then
          echo "pull_request 以外のイベントのため検証をスキップします。"
          exit 0;
        fi

        if [[ ("${{ github.head_ref }}" == feature/* && "${{ github.base_ref }}" == develop) || ("${{ github.head_ref }}" == hotfix/* && ("${{ github.base_ref }}" == develop || "${{ github.base_ref }}" == main || "${{ github.base_ref }}" == release/*)) || ("${{ github.head_ref }}" == release/* && ("${{ github.base_ref }}" == develop || "${{ github.base_ref }}" == main)) ]]; then
          echo "許可されたブランチ組み合わせです。"
          exit 0;
        fi

        echo "許可されていないブランチ組み合わせです: head=${{ github.head_ref }}, base=${{ github.base_ref }}"
        echo "許可条件: (head=feature/* かつ base=develop) または (head=hotfix/* かつ base=develop/main/release/*) または (head=release/* かつ base=develop/main)"
        exit 1;
